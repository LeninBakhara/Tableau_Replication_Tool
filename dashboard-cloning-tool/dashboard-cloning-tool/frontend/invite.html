<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accept Invite — Dashboard Cloning Tool</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#0a0c14;--surface:#111320;--surface2:#181b2e;--border:#1e2240;--amber:#f59e0b;--amber2:#fbbf24;--text:#e2e8f0;--muted:#64748b;--danger:#ef4444;--success:#10b981}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center}
  .bg-grid{position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.4;pointer-events:none}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:48px 44px;width:100%;max-width:420px;position:relative;z-index:1;animation:fadeUp .4s ease}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  .badge{display:inline-flex;align-items:center;gap:6px;background:rgba(245,158,11,0.12);border:1px solid rgba(245,158,11,0.3);color:var(--amber);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:500;margin-bottom:24px;text-transform:capitalize}
  .dot{width:6px;height:6px;background:var(--amber);border-radius:50%}
  h2{font-size:22px;font-weight:600;letter-spacing:-0.5px;margin-bottom:6px}
  .subtitle{font-size:13px;color:var(--muted);margin-bottom:32px}
  .email-chip{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--amber);margin-bottom:24px;font-family:'DM Mono',monospace}
  .field{margin-bottom:18px}
  label{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-bottom:6px;letter-spacing:0.3px;text-transform:uppercase}
  input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:11px 14px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s}
  input:focus{border-color:var(--amber)}
  .btn{width:100%;background:var(--amber);color:var(--bg);border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:background .2s;margin-top:8px}
  .btn:hover{background:var(--amber2)}
  .btn:disabled{opacity:0.5;cursor:not-allowed}
  .error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:var(--danger);border-radius:8px;padding:10px 14px;font-size:13px;margin-top:16px;display:none}
  .loading{text-align:center;color:var(--muted);padding:40px}
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono&display=swap');
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="card" id="card">
  <div class="loading">Loading invite…</div>
</div>
<script>
const params = new URLSearchParams(location.search);
const token = params.get('token');

async function loadInvite() {
  if (!token) { showBroken('No invite token found.'); return; }
  try {
    const res = await fetch(`/api/auth/invite-info?token=${token}`);
    const data = await res.json();
    if (!res.ok) { showBroken(data.detail || 'Invalid invite'); return; }
    renderForm(data.email, data.role);
  } catch(e) { showBroken('Network error.'); }
}

function renderForm(email, role) {
  document.getElementById('card').innerHTML = `
    <div class="badge"><span class="dot"></span> Invited as ${role}</div>
    <h2>Set up your account</h2>
    <p class="subtitle">You've been invited to Dashboard Cloning Tool</p>
    <div class="email-chip">${email}</div>
    <div class="field"><label>Your Name</label><input id="name" placeholder="Full name" type="text"></div>
    <div class="field"><label>Password</label><input id="password" placeholder="Min 8 characters" type="password"></div>
    <div class="field"><label>Confirm Password</label><input id="confirm" placeholder="Repeat password" type="password"></div>
    <button class="btn" id="acceptBtn" onclick="accept('${token}')">Create account &amp; sign in</button>
    <div class="error" id="error"></div>
  `;
}

function showBroken(msg) {
  document.getElementById('card').innerHTML = `
    <h2 style="color:var(--danger)">Invalid invite</h2>
    <p style="color:var(--muted);margin-top:12px;font-size:14px">${msg}</p>
    <a href="/login.html" style="display:inline-block;margin-top:24px;color:var(--amber);font-size:14px">← Back to login</a>
  `;
}

async function accept(token) {
  const name = document.getElementById('name').value.trim();
  const password = document.getElementById('password').value;
  const confirm = document.getElementById('confirm').value;
  if (!name) { showError('Please enter your name'); return; }
  if (password.length < 8) { showError('Password must be at least 8 characters'); return; }
  if (password !== confirm) { showError('Passwords do not match'); return; }
  const btn = document.getElementById('acceptBtn');
  btn.disabled = true; btn.textContent = 'Creating account…';
  try {
    const res = await fetch('/api/auth/accept-invite', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({token, name, password})
    });
    const data = await res.json();
    if (!res.ok) { showError(data.detail); return; }
    localStorage.setItem('token', data.token);
    localStorage.setItem('user', JSON.stringify(data.user));
    window.location.href = '/app.html';
  } catch(e) { showError('Network error'); }
  finally { if(btn) { btn.disabled=false; btn.textContent='Create account & sign in'; } }
}

function showError(msg) {
  const el = document.getElementById('error');
  if (el) { el.textContent = msg; el.style.display = 'block'; }
}

loadInvite();
</script>
</body>
</html>
